    /* Elegant Wave Flow Animations for Tricolor Aura */
    @keyframes waveSlow {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -50px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
      100% { transform: translate(0, 0) scale(1); }
    }
    .animate-aura-saffron {
      animation: waveSlow 18s ease-in-out infinite;
    }
    .animate-aura-green {
      animation: waveSlow 22s ease-in-out infinite;
    }
    
    /* Spin animation for Ashok Chakra */
    @keyframes spinChakra {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .animate-chakra-spin {
      animation: spinChakra 120s linear infinite;
    }

    /* Wave effect inside flowchart paths */
    @keyframes flowLine {
      0% { stroke-dashoffset: 24; }
      100% { stroke-dashoffset: 0; }
    }
    .animated-flow-path {
      stroke-dasharray: 8, 4;
      animation: flowLine 2s linear infinite;
    }

    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {

    }
    .scrollbar-light::-webkit-scrollbar-thumb {

      border-radius: 9999px;
    }
    .scrollbar-dark::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 9999px;
    }
  </style>

                        className="py-3 px-5 bg-slate-900 hover:bg-slate-800 dark:bg-orange-600 dark:hover:bg-orange-500 text-white font-extrabold text-xs rounded-xl transition-all"
                      >
                        Track
                      </button>
                    </form>

                    {/* Result Frame */}
                    {trackingResult ? (
                      <div className={`p-4 rounded-2xl border transition-all ${
                        isDark ? 'bg-slate-950/80 border-slate-800' : 'bg-white border-slate-300/80'
                      }`}>
                        <div className="flex items-start justify-between mb-3">
                          <div>
                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wide">Telemetry Stage</span>
                            <h4 className="text-xs font-black text-slate-800 dark:text-slate-100 mt-0.5">{trackingResult.stage}</h4>
                          </div>
                          <span className={`text-[10px] px-2.5 py-0.5 rounded-full font-bold border ${trackingResult.color}`}>
                            {trackingResult.status}
                          </span>
                        </div>
                        
                        <p className="text-[11px] text-slate-500 dark:text-slate-400 leading-relaxed mb-4">
                          {trackingResult.desc}
                        </p>

                        <div className="space-y-1.5 pt-2.5 border-t border-slate-200 dark:border-slate-900 flex items-center justify-between text-[10px] text-slate-400 font-bold">
                          <span>Updated: {trackingResult.date}</span>
                          <span className="text-orange-500">Secure Ward Signature verified ✓</span>
                        </div>
                      </div>
                    ) : (
                      <div className="text-center py-6 text-xs text-slate-400 font-medium border border-dashed border-slate-300 dark:border-slate-800 rounded-2xl">
                        Enter token code SB-100-IND or custom characters to inspect ward registry records.
                      </div>
                    )}

                  </div>
                </div>

              </div>

            </div>
          </section>

          {/* ==========================================
              UTILITY RESOURCES & COMPENDIUM LINKS
              ========================================== */}
          <section className={`py-12 border-t ${
            isDark ? 'border-slate-900 bg-slate-950/10' : 'border-slate-200 bg-slate-100/20'
          }`}>
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                
                <a href="https://pgportal.gov.in/" target="_blank" rel="noreferrer" className={`p-4 rounded-2xl border text-center transition-all hover:-translate-y-1 ${
                  isDark ? 'bg-slate-900 border-slate-850 hover:bg-slate-800' : 'bg-white border-slate-200 hover:bg-slate-50'
                }`}>
                  <h4 className="text-xs font-black text-orange-500 uppercase tracking-wide mb-1">CPGRAMS</h4>
                  <p className="text-[10px] text-slate-500 leading-relaxed">Centralized Grievance Registry Gateway</p>
                </a>

                <a href="https://uidai.gov.in/" target="_blank" rel="noreferrer" className={`p-4 rounded-2xl border text-center transition-all hover:-translate-y-1 ${
                  isDark ? 'bg-slate-900 border-slate-850 hover:bg-slate-800' : 'bg-white border-slate-200 hover:bg-slate-50'
                }`}>
                  <h4 className="text-xs font-black text-orange-500 uppercase tracking-wide mb-1">UIDAI</h4>
                  <p className="text-[10px] text-slate-500 leading-relaxed">Aadhaar Document Protocols Registry</p>
                </a>

                <a href="https://pmkisan.gov.in/" target="_blank" rel="noreferrer" className={`p-4 rounded-2xl border text-center transition-all hover:-translate-y-1 ${
                  isDark ? 'bg-slate-900 border-slate-850 hover:bg-slate-800' : 'bg-white border-slate-200 hover:bg-slate-50'
                }`}>
                  <h4 className="text-xs font-black text-orange-500 uppercase tracking-wide mb-1">PM-Kisan</h4>
                  <p className="text-[10px] text-slate-500 leading-relaxed">Agriculture Scheme Distribution index</p>
                </a>

                <a href="https://www.digitalindia.gov.in/" target="_blank" rel="noreferrer" className={`p-4 rounded-2xl border text-center transition-all hover:-translate-y-1 ${
                  isDark ? 'bg-slate-900 border-slate-850 hover:bg-slate-800' : 'bg-white border-slate-200 hover:bg-slate-50'
                }`}>
                  <h4 className="text-xs font-black text-orange-500 uppercase tracking-wide mb-1">Digital India</h4>
                  <p className="text-[10px] text-slate-500 leading-relaxed">National Digital Empowerment Compendium</p>
                </a>

              </div>
            </div>
          </section>

          {/* ==========================================
              ABOUT SMART BHARAT SECTION
              ========================================== */}
          <section id="about" className={`py-16 border-t ${
            isDark ? 'border-slate-900 bg-slate-950/20' : 'border-slate-200 bg-white'
          }`}>
            <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center space-y-6">
              <div className="inline-flex items-center justify-center p-3 rounded-2xl bg-orange-500/10 text-orange-500">
                <Shield className="w-6 h-6 animate-pulse" />
              </div>
              <h2 className="text-2xl sm:text-3xl font-black tracking-tight">{currentText.aboutTitle}</h2>
              <p className="text-xs sm:text-sm text-slate-500 dark:text-slate-400 leading-relaxed max-w-2xl mx-auto">
                {currentText.aboutText}
              </p>
            </div>
          </section>

          {/* ==========================================
              FOOTER SECTION
              ========================================== */}
          <footer className={`border-t py-12 ${
            isDark ? 'border-slate-900 bg-slate-950/40' : 'border-slate-200 bg-slate-100/50'
          }`}>
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              
              <div className="flex flex-col md:flex-row items-center justify-between gap-6 text-xs text-slate-450 font-medium">
                
                {/* Brand Footprint */}
                <div className="flex items-center space-x-3">
                  <div className="w-7 h-7 rounded-lg bg-orange-500/10 border border-orange-500/30 flex items-center justify-center">
                    <div className="w-4 h-4 rounded-full border-2 border-dashed border-blue-800 dark:border-blue-400"></div>
                  </div>
                  <div>
                    <span className="block text-xs font-extrabold tracking-tight">{currentText.brand}</span>
                    <span className="block text-[10px] text-slate-500 dark:text-slate-400">Independent Citizens Sandbox Aux</span>
                  </div>
                </div>

                {/* Right Links & Disclaimer */}
                <div className="text-center md:text-right space-y-1">
                  <p>{currentText.copyright}</p>
                  <p className="text-[10px] text-slate-500 dark:text-slate-500 font-normal">
                    This portal operates independently of official government servers to aid in CPGRAMS & UIDAI preparation.
                  </p>
                </div>

              </div>

            </div>
          </footer>

          {/* ==========================================
              TOAST NOTIFICATION ENGINE
              ========================================== */}
          {toastMessage && (
            <div className="fixed bottom-5 right-5 z-50 animate-bounce">
              <div className={`py-3 px-5 rounded-2xl border text-xs font-bold shadow-xl flex items-center gap-2 ${
                isDark ? 'bg-slate-900 border-slate-800 text-slate-200 shadow-slate-950/50' : 'bg-white border-slate-200 text-slate-850 shadow-slate-200/50'
              }`}>
                <div className="w-2 h-2 rounded-full bg-orange-500"></div>
                <span>{toastMessage}</span>
              </div>
            </div>
          )}

        </div>
      );
    }

    // React Mount Injection to DOM mount
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

</body>
</html>
