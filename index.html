      33% { transform: translate(25px, -35px) scale(1.05); }
      66% { transform: translate(-15px, 15px) scale(0.98); }

    /* Reassuring slow spin for symbol of progress */

      to { transform: rotate(360deg); }

    /* Soft dashed flow line for the citizen journey */

      // Handle sending messages from user input

        const updatedMessages = [...messages, { sender: 'user', text: textToProcess, timestamp }];
        setMessages(updatedMessages);
        setInputVal("");
        setIsTyping(true);

        const botResponse = await callVercelChatAPI(textToProcess, updatedMessages.slice(1, -1), lang);
        
        setMessages(prev => [...prev, {
          sender: 'bot',
          text: botResponse,
          timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        }]);
        setIsTyping(false);
      };

      // Detect user address using high precision geolocation
      const handleDetectLocation = () => {
        if (navigator.geolocation) {

        setIsAnalyzingComplaint(true);

        const rawResponse = await callVercelChatAPI(analysisPrompt, [], lang, true);

        try {
          // Parse potential JSON safely from response blocks
          let cleaned = rawResponse || "{}";
          if (cleaned.includes("```json")) {
            cleaned = cleaned.split("```json")[1].split("```")[0];
          } else if (cleaned.includes("```")) {
            cleaned = cleaned.split("```")[1].split("```")[0];
          }
          
          const parsed = JSON.parse(cleaned.trim());
          setAnalysisResult({
            category: parsed.category || "General Municipal Issue",
            department: parsed.department || "Municipal Corporation & Welfare Division",
            priority: parsed.priority || "Medium",
            generatedComplaint: parsed.generatedComplaint || "No draft could be prepared. Please state your issue more clearly."
          });
          triggerToast("Our Civic Friend completed the review!");
        } catch (e) {
          console.error("JSON parsing error, formatting standard draft fallback", e);

            department: "Municipal Corporation",
            priority: "Medium",

        }

        const randomNum = Math.floor(100000 + Math.random() * 900000);
        const generatedId = `SB-2026-${randomNum}`;

          id: generatedId,
          category: analysisResult.category,
          department: analysisResult.department,
          priority: analysisResult.priority,
          description: complaintDesc,

        return raw.split('\n').map((line, idx) => {

          const boldRegex = /\*\*([^*]+)\*\*/g;
          const pieces = [];
          let lastPosition = 0;
          let match;
          
          while ((match = boldRegex.exec(line)) !== null) {

            lastPosition = boldRegex.lastIndex;

            pieces.push(line.substring(lastPosition));

                          </div>
                        </div>
                        
                        <p className="text-[11px] text-slate-500 dark:text-slate-400 leading-relaxed">
                          <strong>Reported issue details:</strong> {trackingResult.description}
                        </p>

                        {/* VERTICAL INTERACTIVE PROGRESS TIMELINE */}
                        <div className="pt-4 border-t border-slate-250 dark:border-slate-850 space-y-5">
                          <span className="block text-[10px] font-black tracking-wider uppercase text-slate-400">
                            Current Status Progression
                          </span>

                          <div className="relative pl-6 space-y-6 text-xs text-slate-600 dark:text-slate-350">
                            
                            {/* Connector line */}
                            <div className="absolute top-1.5 bottom-1.5 left-[7px] w-0.5 bg-slate-200 dark:bg-slate-800"></div>

                            {/* Stage 1: Submitted */}
                            <div className="relative flex items-start gap-3">
                              <span className="absolute -left-[24px] w-4.5 h-4.5 rounded-full bg-emerald-500 border-4 border-white dark:border-slate-900 flex items-center justify-center"></span>
                              <div>
                                <h5 className="font-black text-slate-800 dark:text-white">Submitted</h5>
                                <p className="text-[10px] text-slate-400 mt-0.5">Complaint generated and safely filed in our local ledger.</p>
                              </div>
                            </div>

                            {/* Stage 2: Assigned */}
                            <div className="relative flex items-start gap-3">
                              <span className={`absolute -left-[24px] w-4.5 h-4.5 rounded-full border-4 border-white dark:border-slate-900 flex items-center justify-center ${
                                ["assigned", "under review", "resolved"].includes(trackingResult.status.toLowerCase())
                                  ? "bg-emerald-500"
                                  : "bg-slate-200 dark:bg-slate-800"
                              }`}></span>
                              <div>
                                <h5 className="font-black text-slate-800 dark:text-white">Assigned</h5>
                                <p className="text-[10px] text-slate-400 mt-0.5">Ticket forwarded successfully to the ward officer division supervisor.</p>
                              </div>
                            </div>

                            {/* Stage 3: Under Review */}
                            <div className="relative flex items-start gap-3">
                              <span className={`absolute -left-[24px] w-4.5 h-4.5 rounded-full border-4 border-white dark:border-slate-900 flex items-center justify-center ${
                                ["under review", "resolved"].includes(trackingResult.status.toLowerCase())
                                  ? "bg-yellow-500"
                                  : "bg-slate-200 dark:bg-slate-800"
                              }`}></span>
                              <div>
                                <h5 className="font-black text-slate-800 dark:text-white">Under Review</h5>
                                <p className="text-[10px] text-slate-400 mt-0.5">Local engineers are inspecting the physical site and preparing raw materials.</p>
                              </div>
                            </div>

                            {/* Stage 4: Resolved */}
                            <div className="relative flex items-start gap-3">
                              <span className={`absolute -left-[24px] w-4.5 h-4.5 rounded-full border-4 border-white dark:border-slate-900 flex items-center justify-center ${
                                trackingResult.status.toLowerCase() === "resolved"
                                  ? "bg-emerald-500"
                                  : "bg-slate-200 dark:bg-slate-800"
                              }`}></span>
                              <div>
                                <h5 className="font-black text-slate-800 dark:text-white">Resolved</h5>
                                <p className="text-[10px] text-slate-400 mt-0.5">Works concluded safely. Streets are safe and cleared for citizens.</p>
                              </div>
                            </div>

                          </div>
                        </div>

                      </div>
                    ) : (
                      <div className="text-center py-6 text-xs text-slate-400 font-semibold border border-dashed border-slate-300 dark:border-slate-800 rounded-2xl">
                        Type any simple letter code (e.g. SB-101, SB-102) to inspect neighborhood progress reports.
                      </div>
                    )}

                  </div>
                </div>

              </div>

            </div>
          </section>

          {/* SIMPLIFIED GENUINE CITIZEN EXTERNAL RESOURCES */}
          <section className={`py-12 border-t ${
            isDark ? 'border-slate-900 bg-slate-950/10' : 'border-slate-200 bg-slate-100/10'
          }`}>
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              
              <div className="text-center max-w-2xl mx-auto mb-8">
                <h3 className="text-sm font-extrabold uppercase tracking-widest text-slate-400 dark:text-slate-500">
                  {currentText.officialResources}
                </h3>
              </div>

              <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                
                <a href="https://pgportal.gov.in/" target="_blank" rel="noreferrer" className={`p-4 rounded-2xl border text-center transition-all hover:-translate-y-0.5 ${
                  isDark ? 'bg-slate-900 border-slate-800 hover:bg-slate-800' : 'bg-white border-slate-200 hover:bg-slate-50 shadow-sm'
                }`}>
                  <h4 className="text-xs font-black text-orange-500 uppercase tracking-wide mb-1">PGPortal</h4>
                  <p className="text-[10px] text-slate-500 leading-relaxed">Centralized National Grievance Portal</p>
                </a>

                <a href="https://uidai.gov.in/" target="_blank" rel="noreferrer" className={`p-4 rounded-2xl border text-center transition-all hover:-translate-y-0.5 ${
                  isDark ? 'bg-slate-900 border-slate-800 hover:bg-slate-800' : 'bg-white border-slate-200 hover:bg-slate-50 shadow-sm'
                }`}>
                  <h4 className="text-xs font-black text-orange-500 uppercase tracking-wide mb-1">UIDAI Aadhaar</h4>
                  <p className="text-[10px] text-slate-500 leading-relaxed">Official Government Card Services</p>
                </a>

                <a href="https://pmkisan.gov.in/" target="_blank" rel="noreferrer" className={`p-4 rounded-2xl border text-center transition-all hover:-translate-y-0.5 ${
                  isDark ? 'bg-slate-900 border-slate-800 hover:bg-slate-800' : 'bg-white border-slate-200 hover:bg-slate-50 shadow-sm'
                }`}>
                  <h4 className="text-xs font-black text-orange-500 uppercase tracking-wide mb-1">PM-Kisan Portal</h4>
                  <p className="text-[10px] text-slate-500 leading-relaxed">Official Farming Benefit Register</p>
                </a>

                <a href="https://www.digitalindia.gov.in/" target="_blank" rel="noreferrer" className={`p-4 rounded-2xl border text-center transition-all hover:-translate-y-0.5 ${
                  isDark ? 'bg-slate-900 border-slate-800 hover:bg-slate-800' : 'bg-white border-slate-200 hover:bg-slate-50 shadow-sm'
                }`}>
                  <h4 className="text-xs font-black text-orange-500 uppercase tracking-wide mb-1">Digital India</h4>
                  <p className="text-[10px] text-slate-500 leading-relaxed">National Digital Empowerment Initiatives</p>
                </a>

              </div>
            </div>
          </section>

          {/* ABOUT US SECTION */}
          <section id="about" className={`py-16 border-t ${
            isDark ? 'border-slate-900 bg-slate-950/20' : 'border-slate-200 bg-white'
          }`}>
            <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center space-y-6">
              <div className="inline-flex items-center justify-center p-3 rounded-2xl bg-orange-500/10 text-orange-500">
                <svg className="w-6 h-6 animate-pulse" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              </div>
              <h2 className="text-2xl sm:text-3xl font-black tracking-tight">{currentText.aboutTitle}</h2>
              <p className="text-xs sm:text-sm text-slate-500 dark:text-slate-400 leading-relaxed max-w-2xl mx-auto font-semibold">
                {currentText.aboutText}
              </p>
            </div>
          </section>

          {/* FOOTER */}
          <footer className={`border-t py-12 ${
            isDark ? 'border-slate-900 bg-slate-950/40' : 'border-slate-200 bg-slate-50'
          }`}>
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              
              <div className="flex flex-col md:flex-row items-center justify-between gap-6 text-xs text-slate-550 font-medium">
                
                {/* Brand Footprint with Circle Logo */}
                <div className="flex items-center space-x-3">
                  <div className="w-10 h-10 rounded-full overflow-hidden bg-slate-100 border border-slate-200 dark:border-slate-800 flex items-center justify-center shadow-inner">
                    <img 
                      src="files/bharat.jpg" 
                      alt="Smart Bharat Logo" 
                      className="w-full h-full object-cover"
                      onError={(e) => {
                        e.target.style.display = 'none';
                        e.target.parentNode.innerHTML = `<div class="text-[9px] font-black text-orange-500">SB</div>`;
                      }}
                    />
                  </div>
                  <div>
                    <span className="block text-xs font-extrabold tracking-tight">{currentText.brand}</span>
                    <span className="block text-[10px] text-slate-500 dark:text-slate-400">Independent Citizens Assistance Helper</span>
                  </div>
                </div>

                {/* Right Links & Disclaimer */}
                <div className="text-center md:text-right space-y-1">
                  <p>{currentText.copyright}</p>
                  <p className="text-[10px] text-slate-400 dark:text-slate-500 font-normal">
                    This portal operates independently of official government servers to assist in application letter drafts.
                  </p>
                </div>

              </div>

            </div>
          </footer>

          {/* TOAST NOTIFICATION ENGINE */}
          {toastMessage && (
            <div className="fixed bottom-5 right-5 z-50 animate-bounce">
              <div className={`py-3 px-5 rounded-2xl border text-xs font-extrabold shadow-xl flex items-center gap-2 ${
                isDark ? 'bg-slate-900 border-slate-800 text-slate-200 shadow-slate-950/50' : 'bg-white border-slate-150 text-slate-800 shadow-slate-200/50'
              }`}>
                <div className="w-1.5 h-1.5 rounded-full bg-orange-500"></div>
                <span>{toastMessage}</span>
              </div>
            </div>
          )}

        </div>
      );
    }

    // React Mount Injection to DOM mount
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

</body>
</html>
