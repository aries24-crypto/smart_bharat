      33% { transform: translate(25px, -35px) scale(1.05); }
      66% { transform: translate(-15px, 15px) scale(0.98); }

    /* Reassuring slow spin for symbol of progress */

      to { transform: rotate(360deg); }

> మా వీధి నివాసితుల తరఫున, ప్రధాన రహదారి దయనీయ స్థితిని మీ దృష్టికి తీసుకురావడానికి ఈ లేఖను రాస్తున్నాను. రహదారి మధ్యలో ప్రమాదకరమైన లోతైన గుంతలు ఏర్పడ్డాయి, దీనివల్ల తరచుగా ప్రమాదాలు జరుగుతున్నాయి. ముఖ్యంగా వృద్ధులు, చిన్న పిల్లలు మరియు ద్విచక్ర వాహనదారులు ఈ రోడ్డుపై ప్రయాణించడం చాలా ప్రమాదకరంగా మారింది.
>
> వర్షాకాలంలో ఈ గుంతలలో నీరు నిలిచిపోవడం వల్ల అవి కనిపించక ప్రమాదాలు మరింత పెరుగుతున్నాయి. కావున, దయచేసి మా రహదారిని పరిశీలించి, వీలైనంత త్వరగా ఈ గుంతలను పూడ్చడానికి సిబ్బందికి ఆదేశాలు ఇవ్వాల్సిందిగా ప్రార్థిస్తున్నాము.
>
> ప్రజల క్షేమాన్ని కోరి తగిన చర్యలు చేపడతారని ఆశిస్తున్నాము.
>
> భవదీయుడు,
> [మీ పేరు]
> [మీ వీధి చిరునామా]

*మీరు ఈ లేఖను ఇక్కడి నుండి కాపీ చేసుకొని, మీ పేరు మరియు చిరునామాను రాసి మీ స్థానిక వార్డు ఆఫీసులో అందజేయవచ్చు.*`
      }
    };

    // ==========================================
    // MAIN APP COMPONENT
    // ==========================================
    function App() {
      // Default theme is Light Mode with white bg
      const [isDark, setIsDark] = useState(false);
      const [lang, setLang] = useState('en');
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      
      // Accordion Active Folder State
      const [activeFolder, setActiveFolder] = useState(null);
      
      // Friendly Complaint Tracker State
      const [trackerCode, setTrackerCode] = useState("");
      const [trackingResult, setTrackingResult] = useState(null);

      // Simple Notification Toast
      const [toastMessage, setToastMessage] = useState("");

      // Chat Simulator & API Stream State
      const [messages, setMessages] = useState([]);
      const [inputVal, setInputVal] = useState("");
      const [isTyping, setIsTyping] = useState(false);
      const chatEndRef = useRef(null);

      // Trigger standard warm welcome message on language switch
      useEffect(() => {
        const selectedText = LOCAL_KNOWLEDGE_BASE[lang] || LOCAL_KNOWLEDGE_BASE.en;
        setMessages([
          {
            sender: 'bot',
            text: selectedText.welcome,
            timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          }
        ]);
      }, [lang]);

      // Auto scroll inside chat box
      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, isTyping]);

      const triggerToast = (msg) => {
        setToastMessage(msg);
        setTimeout(() => setToastMessage(""), 4000);
      };

      // ==========================================
      // ==========================================
      const callVercelChatAPI = async (userPrompt, chatHistory, currentLang) => {
        try {
          // System Prompt written with absolute comfort, kindness, and clear simple instructions
          const systemContext = `You are the official Smart Bharat Civic Friend, a supportive and comforting public assistant helping Indian citizens. 
          Respond in ${currentLang === 'en' ? 'English' : currentLang === 'hi' ? 'Hindi' : currentLang === 'bn' ? 'Bengali' : currentLang === 'ta' ? 'Tamil' : 'Telugu'}.
          Always use warm, comforting, and simple words. Never use computer jargon (like backend, vector, API, sandbox, engine, telemetry). 
          Explain government schemes (PM-Kisan, Ayushman Bharat, PM Awas) and document steps (Aadhaar update, Ration Card) easily.
          If asked to write a letter or complaint, write a respectful, structured formal letter that the citizen can easily copy. Include clear placeholders like [Your Name].`;

          // Format chat history safely for LLM endpoint
          const formattedHistory = chatHistory.map(m => ({
            role: m.sender === 'user' ? 'user' : 'assistant',
            content: m.text
          }));

          const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              messages: [
                { role: 'system', content: systemContext },
                ...formattedHistory,
                { role: 'user', content: userPrompt }
              ]
            })
          });

          if (!response.ok) {
            throw new Error(`API Status Code: ${response.status}`);
          }

          const result = await response.json();
          // Extract message text according to standard LLM chat APIs
          const botReply = result?.choices?.[0]?.message?.content || result?.content || result?.reply;
          if (botReply) {
            return botReply;
          } else {
            return "I could not hear clearly. Please try saying it again in a different way, I am listening.";
          }
        } catch (err) {
          console.log("Vercel Chat API error: falling back to local simplified database.", err);
          // Return fallback content matching search query if Vercel endpoint is not initialized
          const normalizedInput = userPrompt.toLowerCase();
          const targetKb = LOCAL_KNOWLEDGE_BASE[currentLang] || LOCAL_KNOWLEDGE_BASE.en;
          
          if (targetKb.scheme_trigger.some(t => normalizedInput.includes(t))) {
            return targetKb.scheme_response;
          } else if (targetKb.document_trigger.some(t => normalizedInput.includes(t))) {
            return targetKb.document_response;
          } else if (targetKb.complaint_trigger.some(t => normalizedInput.includes(t))) {
            return targetKb.complaint_response;
          } else {
            const fallbacks = {
              en: `🔍 I searched our simplified database for "${userPrompt}". To find specific details, try asking me about **"PM-Kisan Scheme"**, **"Aadhaar card update steps"**, or **"Report street pothole"**!`,
              hi: `🔍 मैंने आपकी बात "${userPrompt}" को समझने की कोशिश की। इसके बारे में अधिक जानने के लिए, कृपया **"किसान योजना"**, **"आधार कार्ड सुधार"**, या **"सड़क के गड्ढों की शिकायत"** जैसे प्रश्न पूछें!`,
              bn: `🔍 আমি আমাদের সাধারণ তালিকায় "${userPrompt}" খুঁজলাম। এই বিষয়ে জানতে দয়া করে আমাকে **"কিষাণ প্রকল্প"**, **"আধার কার্ড পরিবর্তন"**, অথবা **"রাস্তার গর্ত মেরামতের দরখাস্ত"** লিখে প্রশ্ন করুন!`,
              ta: `🔍 நான் உங்கள் கேள்விக்கான "${userPrompt}" தகவலைத் தேடினேன். இன்னும் தெளிவாக அறிய **"விவசாயிகள் திட்டம்"**, **"ஆதார் முகவரி மாற்றம்"** அல்லது **"சாலைப் பள்ளம் புகார் கடிதம்"** என்று என்னிடம் கேளுங்கள்!`,
              te: `🔍 నేను మన సులువైన డేటాబేస్ లో "${userPrompt}" కోసం వెతికాను. మరిన్ని వివరాల కోసం **"రైతు పథకం"**, **"ఆధార్ కార్డ్ మార్పులు"**, లేదా **"రోడ్డు గుంతల దరఖాస్తు"** గురించి నన్ను అడగండి!`
            };
            return fallbacks[currentLang] || fallbacks.en;
          }
        }
      };

      // Handle sending messages from user input
      const handleSendMessage = async (customText) => {
        const textToProcess = customText || inputVal;
        if (!textToProcess.trim()) return;

        const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const updatedMessages = [...messages, { sender: 'user', text: textToProcess, timestamp }];
        setMessages(updatedMessages);
        setInputVal("");
        setIsTyping(true);

        // Fetch using our secure connection
        const botResponse = await callVercelChatAPI(textToProcess, updatedMessages.slice(1, -1), lang);
        
        setMessages(prev => [...prev, {
          sender: 'bot',
          text: botResponse,
          timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        }]);
        setIsTyping(false);
      };

      // Parse bold markers and blockquotes into highly readable visual elements
      const parseFriendlyMarkdown = (raw) => {
        if (!raw) return '';
        return raw.split('\n').map((line, idx) => {
          let lineContent = line;
          
          // Match simple bold text **text**
          const boldRegex = /\*\*([^*]+)\*\*/g;
          const pieces = [];
          let lastPosition = 0;
          let match;
          
          while ((match = boldRegex.exec(line)) !== null) {
            if (match.index > lastPosition) {
              pieces.push(line.substring(lastPosition, match.index));
            }
            pieces.push(<strong key={match.index} className="font-bold text-orange-600 dark:text-orange-400">{match[1]}</strong>);
            lastPosition = boldRegex.lastIndex;
          }
          if (lastPosition < line.length) {
            pieces.push(line.substring(lastPosition));
          }

          const containsFormatting = pieces.length > 0;

          // Render blockquote letters beautifully with a warm click-to-copy helper
          if (line.trim().startsWith('>')) {
            const letterTextOnly = line.replace(/^>\s*/, '').trim();
            return (
              <blockquote key={idx} className="border-l-4 border-orange-500 pl-4 py-2.5 my-2.5 bg-slate-50 dark:bg-slate-800 text-slate-700 dark:text-slate-300 rounded-r-xl font-mono text-[11px] leading-relaxed relative group">
                {containsFormatting ? pieces : line.replace(/^>\s*/, '')}
                <button 
                  onClick={() => {
                    document.execCommand('copy') || navigator.clipboard.writeText(letterTextOnly);
                    triggerToast(currentText.complaintDrafted);
                  }} 
                  className="absolute top-2 right-2 p-1.5 rounded-lg bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 text-slate-500 hover:text-slate-800 dark:hover:text-white transition-all shadow-sm"
                  title="Copy This Draft"
                >
                  {/* Inline Copy Icon */}
                  <svg className="w-3.5 h-3.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                </button>
              </blockquote>
            );
          }

          return (
            <span key={idx} className="block min-h-[0.5rem]">
              {containsFormatting ? pieces : line}
            </span>
          );
        });
      };

      // Navigate comfortably inside single page
      const handleSmoothScroll = (sectionId) => {
        const element = document.getElementById(sectionId);
        if (element) {
          element.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        setMobileMenuOpen(false);
      };

      // Track issue status using warm, non-technical words
      const handleTrackComplaint = (e) => {
        e.preventDefault();
        if (!trackerCode.trim()) return;
        
        const code = trackerCode.trim().toUpperCase();
        const simplifiedStages = [
          { status: "Received", progress: 25, title: "Our Support Received Your Letter", date: "July 05, 2026", note: "Your letter was safely received at our civic help desk and is being prepared to be sent directly to your local ward office." },
          { status: "Forwarded", progress: 50, title: "Forwarded to Local Officers", date: "July 06, 2026", note: "The letter has been forwarded to the local ward maintenance supervisor. They are preparing a local inspection team." },
          { status: "Work Scheduled", progress: 75, title: "Work Commencing Soon", date: "July 07, 2026", note: "The local office has scheduled repair team visits to inspect the potholes. Work supplies are being prepared." },
          { status: "Fully Resolved", progress: 100, title: "Problem Handled Safely", date: "July 08, 2026", note: "The local officers have filled the potholes. Roads are now safe for children and elder citizens." }
        ];
        
        // Select deterministic step from array
        const stepIndex = Math.abs(code.charCodeAt(0) || 0) % simplifiedStages.length;
        setTrackingResult(simplifiedStages[stepIndex]);
        triggerToast("We synchronized your letter's progress.");
      };

      const currentText = CIVIC_TRANSLATIONS[lang] || CIVIC_TRANSLATIONS.en;

      return (
        <div className={`min-h-screen transition-colors duration-300 relative overflow-x-hidden selection:bg-orange-500/20 selection:text-orange-700 ${
          isDark ? 'bg-slate-950 text-slate-100' : 'bg-slate-50/50 text-slate-900'
        }`}>

          {/* ==========================================
              TRICOLOR BACKGROUND AURAS (Patriotic Warm Design)
              ========================================== */}
          <div className="absolute top-0 left-0 w-full h-[800px] pointer-events-none overflow-hidden z-0">
            <div className="absolute top-[-5%] left-[-10%] w-[50%] h-[50%] rounded-full bg-orange-500/5 dark:bg-orange-600/5 blur-[120px] animate-aura-saffron"></div>
            <div className="absolute top-[25%] right-[-10%] w-[50%] h-[50%] rounded-full bg-emerald-500/5 dark:bg-emerald-600/5 blur-[120px] animate-aura-green"></div>
            
            {/* Elegant Emblem Backdrop in the background */}
            <div className="absolute top-[12%] left-[50%] -translate-x-1/2 w-[550px] h-[550px] rounded-full border border-slate-200/40 dark:border-slate-800/20 flex items-center justify-center opacity-60">
              <div className="w-[480px] h-[480px] rounded-full border border-dashed border-slate-300/30 dark:border-slate-800/10 animate-symbol-spin"></div>
            </div>
          </div>

          {/* ==========================================
              STREAMING_CHUNK: Preparing the beautiful top navigation bar...
              ========================================== */}
          {/* NAVIGATION BAR */}
          <nav className={`fixed top-0 left-0 w-full z-50 transition-all duration-300 border-b ${
            isDark 
              ? 'bg-slate-950/90 backdrop-blur-md border-slate-900 py-3' 
              : 'bg-white/90 backdrop-blur-md border-slate-200/80 py-3 shadow-sm'
          }`}>
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex items-center justify-between">
                
                {/* Genuine Branding Logo Area */}
                <div className="flex items-center space-x-3 cursor-pointer" onClick={() => handleSmoothScroll('main')}>
                  <div className="relative w-10 h-10 rounded-xl overflow-hidden bg-slate-100 border border-slate-200 dark:border-slate-800 flex items-center justify-center shadow-inner">
                    <img 
                      src="bharat.png" 
                      alt="Smart Bharat" 
                      className="w-full h-full object-cover"
                      onError={(e) => {
                        // Safe fallback design if files/bharat.jpg is missing
                        e.target.style.display = 'none';
                        e.target.parentNode.innerHTML = `<div class="text-xs font-black text-orange-500">SB</div>`;
                      }}
                    />
                  </div>
                  <div>
                    <span className="block text-base font-extrabold tracking-tight">
                      {currentText.brand}
                    </span>
                    <span className="block text-[10px] font-bold tracking-wider uppercase text-orange-500 dark:text-orange-400">
                      {currentText.tagline}
                    </span>
                  </div>
                </div>

                {/* Friendly Menu Options */}
                <div className="hidden md:flex items-center space-x-8">
                  <button onClick={() => handleSmoothScroll('main')} className="text-xs font-bold uppercase tracking-wider text-slate-600 dark:text-slate-300 hover:text-orange-500 dark:hover:text-orange-400 transition-colors">Main</button>
                  <button onClick={() => handleSmoothScroll('services')} className="text-xs font-bold uppercase tracking-wider text-slate-600 dark:text-slate-300 hover:text-orange-500 dark:hover:text-orange-400 transition-colors">Services</button>
                  <button onClick={() => handleSmoothScroll('flowchart')} className="text-xs font-bold uppercase tracking-wider text-slate-600 dark:text-slate-300 hover:text-orange-500 dark:hover:text-orange-400 transition-colors">How It Works</button>
                  <button onClick={() => handleSmoothScroll('my-complaints')} className="text-xs font-bold uppercase tracking-wider text-slate-600 dark:text-slate-300 hover:text-orange-500 dark:hover:text-orange-400 transition-colors">My Complaints</button>
                  <button onClick={() => handleSmoothScroll('about')} className="text-xs font-bold uppercase tracking-wider text-slate-600 dark:text-slate-300 hover:text-orange-500 dark:hover:text-orange-400 transition-colors">About</button>
                </div>

                {/* Dynamic Theme & Language Utilities */}
                <div className="hidden md:flex items-center space-x-4">
                  
                  {/* Language Selector Dropdown */}
                  <div className="relative group">
                    <button className="flex items-center space-x-1.5 px-3 py-1.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900 text-xs font-bold hover:bg-slate-100 dark:hover:bg-slate-800 transition-all focus:outline-none">
                      {/* Language Icon */}
                      <svg className="w-3.5 h-3.5 text-orange-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>
                      <span>{lang === 'en' ? 'English' : lang === 'hi' ? 'हिन्दी' : lang === 'bn' ? 'বাংলা' : lang === 'ta' ? 'தமிழ்' : 'తెలుగు'}</span>
                      <svg className="w-3 h-3 text-slate-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                    </button>
                    <div className="absolute right-0 mt-2 w-44 rounded-xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 shadow-xl py-1 opacity-0 pointer-events-none group-hover:opacity-100 group-hover:pointer-events-auto transition-all duration-200 z-50">
                      <button onClick={() => setLang('en')} className="w-full px-4 py-2.5 text-left text-xs text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-900 font-semibold">English</button>
                      <button onClick={() => setLang('hi')} className="w-full px-4 py-2.5 text-left text-xs text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-900 font-semibold">हिन्दी (Hindi)</button>
                      <button onClick={() => setLang('bn')} className="w-full px-4 py-2.5 text-left text-xs text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-900 font-semibold">বাংলা (Bengali)</button>
                      <button onClick={() => setLang('ta')} className="w-full px-4 py-2.5 text-left text-xs text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-900 font-semibold">தமிழ் (Tamil)</button>
                      <button onClick={() => setLang('te')} className="w-full px-4 py-2.5 text-left text-xs text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-900 font-semibold">తెలుగు (Telugu)</button>
                    </div>
                  </div>

                  {/* Gentle Theme Switching Switch */}
                  <button 
                    onClick={() => setIsDark(!isDark)}
                    className="p-2.5 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900 hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-200 transition-all"
                    aria-label="Toggle Theme"
                  >
                    {isDark ? (
                      /* Sun icon */
                      <svg className="w-4 h-4 text-orange-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    ) : (
                      /* Moon icon */
                      <svg className="w-4 h-4 text-slate-600" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    )}
                  </button>

                </div>

                {/* Mobile Hamburger menu */}
                <div className="md:hidden flex items-center space-x-2">
                  <button 
                    onClick={() => setIsDark(!isDark)}
                    className="p-2 rounded-lg border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-300"
