      33% { transform: translate(25px, -35px) scale(1.03); }
      66% { transform: translate(-15px, 15px) scale(0.99); }

    .animate-aura-green {

    /* Reassuring slow spin for symbol of progress */

      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }

    }

    /* Soft dashed flow line for the citizen journey */

      0% { stroke-dashoffset: 24; }

हमारे क्षेत्र में (कोष्ठक के भीतर अपनी समस्या का विस्तार से वर्णन करें - जैसे, सड़क पर गहरे और खतरनाक गड्ढे बन गए हैं, जिससे आए दिन दुर्घटनाएं होती रहती हैं)।

इस स्थिति के कारण यहाँ के सभी निवासियों को अत्यंत कठिनाई का सामना करना पड़ रहा है। अतः आपसे विनम्र निवेदन है कि जनहित को ध्यान में रखते हुए इस समस्या का निरीक्षण कराएं और संबंधित कर्मचारियों को जल्द से जल्द इसे ठीक करने का निर्देश देने की कृपा करें।

आपके त्वरित सहयोग के लिए हम सभी निवासी सदैव आभारी रहेंगे।

भवदीय,

(यहाँ अपना पूरा नाम लिखें)
(यहाँ अपना मोबाइल नंबर लिखें)
(यहाँ दिनांक लिखें)`
      }
    };

    // ==========================================
    // MAIN APP COMPONENT
    // ==========================================
    function App() {
      const [isDark, setIsDark] = useState(false);
      const [lang, setLang] = useState('en');
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      
      const [activeFolder, setActiveFolder] = useState(null);
      const [trackerCode, setTrackerCode] = useState("");
      const [trackingResult, setTrackingResult] = useState(null);
      const [toastMessage, setToastMessage] = useState("");

      // Chat Simulator & API State
      const [messages, setMessages] = useState([]);
      const [inputVal, setInputVal] = useState("");
      const [isTyping, setIsTyping] = useState(false);
      const chatEndRef = useRef(null);

      // --- COMPLAINT FORM STATE ---
      const [complaintImage, setComplaintImage] = useState(null);
      const [complaintLocation, setComplaintLocation] = useState("");
      const [complaintDesc, setComplaintDesc] = useState("");
      const [isAnalyzingComplaint, setIsAnalyzingComplaint] = useState(false);
      const [analysisResult, setAnalysisResult] = useState(null);
      const [successComplaint, setSuccessComplaint] = useState(null);

      // Trigger standard warm welcome message on language switch
      useEffect(() => {
        const selectedText = LOCAL_KNOWLEDGE_BASE[lang] || LOCAL_KNOWLEDGE_BASE.en;
        setMessages([
          {
            sender: 'bot',
            text: selectedText.welcome,
            timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          }
        ]);
      }, [lang]);

      // Auto scroll inside chat box
      useEffect(() => {
        chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, isTyping]);

      const triggerToast = (msg) => {
        setToastMessage(msg);
        setTimeout(() => setToastMessage(""), 4000);
      };

      // ==========================================
      // BACKEND SECURE CONNECTION FOR GROQ (Vercel api/chat route)
      // ==========================================
      const callVercelChatAPI = async (userPrompt, isComplaintAnalysis = false) => {
        try {
          let finalPrompt = userPrompt;

          if (isComplaintAnalysis) {
            finalPrompt = `Analyze the following civic complaint and output ONLY a valid JSON block.
Do not write any introductory or concluding conversational chat text. Return strictly raw JSON in this format:
{
  "category": "Estimated category (e.g., Road Damage, Street Light, Water Leak)",
  "department": "Responsible Indian government department",
  "priority": "High, Medium, or Low",
  "generatedComplaint": "A professional formal letter addressed to local officials. Instead of writing static problem statements, write a general formal layout where details of the issue are placed in clear editable brackets like (Mention exact problem here), (Specify neighborhood landmark here), (Enter your full name here), and (Enter your mobile number here) so the citizen can easily fill in the blanks."
}

Location: ${complaintLocation || 'Unspecified Local Area'}
Description: ${complaintDesc}`;
          }

          // Strict POST request mapping to req.body.message
          const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              message: finalPrompt
            })
          });

          if (!response.ok) {
            throw new Error(`API Status Code: ${response.status}`);
          }

          const result = await response.json();
          if (result && result.success && result.response) {
            return result.response;
          } else {
            throw new Error("Invalid response format from serverless function");
          }
        } catch (err) {
          console.warn("Secure direct backend route error, activating helpful local companion database logic:", err);
          
          if (isComplaintAnalysis) {
            return JSON.stringify({
              category: "General Municipal Support",
              department: "Municipal Development Division (PWD)",
              priority: "High Priority",
              generatedComplaint: `To,\nThe Officer-in-Charge / Municipal Executive Engineer,\n(Specify local office or department name here, e.g., Municipal Corporation / Water Department).\n\nSubject: Request for urgent action regarding (Briefly state your issue here in 5 words, e.g., repair of broken streetlight / leak in water pipe).\n\nRespected Sir/Madam,\n\nI am writing to draw your kind attention to a major issue affecting our locality. Specifically, I am a resident of (Specify your exact street or neighborhood name here).\n\nFor the past few days, we are experiencing a serious problem where (Describe your exact issue in detail here - e.g., the neighborhood streetlights are completely non-functional, creating dangerous dark spots during the night).\n\nThis issue has created extreme inconvenience and safety hazards for children, senior citizens, and pedestrians in our community. \n\nWe kindly request you to dispatch a maintenance officer to inspect this site and resolve this problem at your earliest convenience to prevent any safety hazards.\n\nThanking you in advance for your kind support.\n\nYours faithfully,\n\n(Write Your Full Name here)\n(Provide Your Mobile Number here)\n(Provide Current Date here)`
            });
          }
          
          // Return standard helper chat responses from the simplified database
          const normalizedInput = userPrompt.toLowerCase();
          const targetKb = LOCAL_KNOWLEDGE_BASE[lang] || LOCAL_KNOWLEDGE_BASE.en;
          
          if (targetKb.scheme_trigger.some(t => normalizedInput.includes(t))) {
            return targetKb.scheme_response;
          } else if (targetKb.document_trigger.some(t => normalizedInput.includes(t))) {
            return targetKb.document_response;
          } else if (targetKb.complaint_trigger.some(t => normalizedInput.includes(t))) {
            return targetKb.complaint_response;
          } else {
            const fallbacks = {
              en: `🔍 I searched our simplified database for "${userPrompt}". To get specific details, try asking me about **"PM-Kisan Scheme"**, **"Aadhaar card address steps"**, or **"Write streetlight letter"**!`,
              hi: `🔍 मैंने आपकी बात "${userPrompt}" को खोजने का प्रयास किया। इसके बारे में अधिक जानने के लिए, कृपया **"किसान योजना"**, **"आधार कार्ड सुधार"**, या **"बिजली सुधार पत्र"** जैसे प्रश्न पूछें!`,
              bn: `🔍 আমি আপনার প্রশ্ন "${userPrompt}" খুঁজলাম। এই বিষয়ে জানতে দয়া করে আমাকে **"কিষাণ প্রকল্প"**, **"আধার কার্ড পরিবর্তন"**, অথবা **"রাস্তার আলোর দরখাস্ত"** লিখে প্রশ্ন করুন!`,
              ta: `🔍 நான் உங்கள் கேள்விக்கான "${userPrompt}" தகவலைத் தேடினேன். இன்னும் தெளிவாக அறிய **"விவசாயிகள் திட்டம்"**, **"ஆதார் முகவரி மாற்றம்"** அல்லது **"சாலைப் பள்ளம் புகார் கடிதம்"** என்று என்னிடம் கேளுங்கள்!`,
              te: `🔍 నేను మన సులువైన డేటాబేస్ లో "${userPrompt}" కోసం వెతికాను. మరిన్ని వివరాల కోసం **"రైతు పథకం"**, **"ఆధార్ కార్డ్ మార్పులు"**, లేదా **"రోడ్డు గుంతల దరఖాస్తు"** గురించి నన్ను అడగండి!`
            };
            return fallbacks[lang] || fallbacks.en;
          }
        }
      };

      const handleSendMessage = async (customText) => {
        const textToProcess = customText || inputVal;
        if (!textToProcess.trim()) return;

        const timestamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const updatedMessages = [...messages, { sender: 'user', text: textToProcess, timestamp }];
        setMessages(updatedMessages);
        setInputVal("");
        setIsTyping(true);

        const botResponse = await callVercelChatAPI(textToProcess);
        
        setMessages(prev => [...prev, {
          sender: 'bot',
          text: botResponse,
          timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        }]);
        setIsTyping(false);
      };

      // Geolocation tracker helper
      const handleDetectLocation = () => {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            (position) => {
              const coords = `${position.coords.latitude.toFixed(4)}° N, ${position.coords.longitude.toFixed(4)}° E`;
              setComplaintLocation(coords);
              triggerToast("Location auto-detected successfully.");
            },
            () => {
              setComplaintLocation("New Delhi, Delhi");
              triggerToast("Using default Capital location.");
            }
          );
        } else {
          triggerToast("Location detection is not supported by your browser.");
        }
      };

      // Live photo upload logic
      const handleImageChange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => {
            setComplaintImage(reader.result);
          };
          reader.readAsDataURL(file);
        }
      };

      const handleAnalyzeComplaint = async () => {
        if (!complaintDesc.trim()) {
          triggerToast("Please describe your problem first so our Civic Friend can understand.");
          return;
        }

        setIsAnalyzingComplaint(true);
        setAnalysisResult(null);

        const rawResponse = await callVercelChatAPI(complaintDesc, true);

        try {
          let cleaned = rawResponse || "{}";
          if (cleaned.includes("```json")) {
            cleaned = cleaned.split("```json")[1].split("```")[0];
          } else if (cleaned.includes("```")) {
            cleaned = cleaned.split("```")[1].split("```")[0];
          }
          
          const parsed = JSON.parse(cleaned.trim());
          setAnalysisResult({
            category: parsed.category || "General Municipal Issue",
            department: parsed.department || "Municipal Corporation & Welfare Division",
            priority: parsed.priority || "Medium Priority",
            generatedComplaint: parsed.generatedComplaint || "To, Municipal Corporation...\nSubject: Issue regarding (Fill-in detail here)..."
          });
          triggerToast("Our Civic Friend completed the analysis!");
        } catch (e) {
          console.error("JSON parsing fallback due to textual response format", e);
          setAnalysisResult({
            category: "General Civic Concern",
            department: "Municipal Development Board",
            priority: "Medium Priority",
            generatedComplaint: `To,\nThe Officer-in-Charge,\n(Enter local department name here).\n\nSubject: Request for urgent Action regarding (Write your issue title here).\n\nRespected Sir/Madam,\n\nI am writing to draw your attention to a critical problem in (Specify your street landmark here).\n\nSpecifically, we are facing an issue where (Write a clear details of your problem here inside brackets).\n\nThis is creating daily hazards for everyone in our neighborhood. We request you to direct the staff to inspect and fix this as soon as possible.\n\nThanking you,\n\nYours sincerely,\n(Write your name here)\n(Write your phone number here)`
          });
        } finally {
          setIsAnalyzingComplaint(false);
        }
      };

      // Storing the ticket into localStorage
      const handleSubmitComplaint = () => {
        if (!analysisResult) return;

        const randomNum = Math.floor(100000 + Math.random() * 900000);
        const generatedId = `SB-2026-${randomNum}`;

        const newRecord = {
          id: generatedId,
          category: analysisResult.category,
          department: analysisResult.department,
          priority: analysisResult.priority,
          description: complaintDesc,
          location: complaintLocation,
          generatedComplaint: analysisResult.generatedComplaint,
          image: complaintImage,
          status: "Submitted",
          history: [
            { stage: "Submitted", date: new Date().toLocaleDateString(), note: "Your complaint draft was compiled and registered inside local session memory." }
          ]
        };

        const currentLocal = JSON.parse(localStorage.getItem('smart_bharat_complaints') || "[]");
        currentLocal.push(newRecord);
        localStorage.setItem('smart_bharat_complaints', JSON.stringify(currentLocal));

        setSuccessComplaint(newRecord);
        setTrackerCode(generatedId); 
        triggerToast("Complaint submitted successfully!");
      };

      const handleResetForm = () => {
        setComplaintImage(null);
        setComplaintLocation("");
        setComplaintDesc("");
        setAnalysisResult(null);
        setSuccessComplaint(null);
      };

      // Searching the tracker locally
      const handleSearchTracker = (e) => {
        if (e) e.preventDefault();
        if (!trackerCode.trim()) return;

        const code = trackerCode.trim().toUpperCase();
        const stored = JSON.parse(localStorage.getItem('smart_bharat_complaints') || "[]");
        const found = stored.find(item => item.id.toUpperCase() === code);

        if (found) {
          setTrackingResult(found);
          triggerToast("We synchronized your letter's progress.");
        } else {
          const defaultStages = {
            "SB-101": { id: "SB-101", category: "Public Lighting", department: "Electricity & Safety Board", priority: "High", description: "Streetlights on Lane 4 are flickering and shut down permanently after dusk.", location: "Lane 4 Market", status: "Under Review" },
            "SB-102": { id: "SB-102", category: "Water Supply", department: "Drinking Water Supply Board", priority: "Medium", description: "Subsided community drinking water tap has a minor leakage wasting natural resources.", location: "Block C Market", status: "Assigned" }
          };

          if (defaultStages[code]) {
            setTrackingResult(defaultStages[code]);
            triggerToast("Default sample tracker loaded.");
          } else {
            setTrackingResult(null);
            triggerToast("Letter reference code not found. File a new one first!");
          }
        }
      };

      // Parser for AI text display inside brackets Highlight
      const parseFriendlyMarkdown = (raw) => {
        if (!raw) return '';
        return raw.split('\n').map((line, idx) => {
          let lineContent = line;
          
          const boldRegex = /\*\*([^*]+)\*\*/g;
          const pieces = [];
          let lastPosition = 0;
          let match;
          
          while ((match = boldRegex.exec(line)) !== null) {
            if (match.index > lastPosition) {
              pieces.push(line.substring(lastPosition, match.index));
            }
            pieces.push(<strong key={match.index} className="font-bold text-orange-600 dark:text-orange-400">{match[1]}</strong>);
            lastPosition = boldRegex.lastIndex;
          }
          if (lastPosition < line.length) {
            pieces.push(line.substring(lastPosition));
          }

          const containsFormatting = pieces.length > 0;

          // Highlight empty bracket spaces () elegantly in draft mode
          if (line.trim().startsWith('>')) {
            const letterTextOnly = line.replace(/^>\s*/, '').trim();
            return (
              <blockquote key={idx} className="border-l-4 border-orange-500 pl-4 py-2.5 my-2.5 bg-slate-50 dark:bg-slate-900/60 text-slate-700 dark:text-slate-300 rounded-r-xl font-mono text-[11px] leading-relaxed relative group">
                {containsFormatting ? pieces : line.replace(/^>\s*/, '')}
                <button 
                  onClick={() => {
                    document.execCommand('copy') || navigator.clipboard.writeText(letterTextOnly);
                    triggerToast(currentText.complaintDrafted);
                  }} 
                  className="absolute top-2 right-2 p-1.5 rounded-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-slate-900 dark:hover:text-white transition-all shadow-sm"
                  title="Copy This Draft"
                >
                  <svg className="w-3.5 h-3.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                </button>
              </blockquote>
            );
          }

          return (
            <span key={idx} className="block min-h-[0.5rem]">
              {containsFormatting ? pieces : line}
            </span>
          );
        });
      };

      const handleSmoothScroll = (sectionId) => {
        const element = document.getElementById(sectionId);
        if (element) {
          element.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        setMobileMenuOpen(false);
      };

      const currentText = CIVIC_TRANSLATIONS[lang] || CIVIC_TRANSLATIONS.en;

      return (
        <div className={`min-h-screen transition-colors duration-300 relative overflow-x-hidden selection:bg-orange-500/20 selection:text-orange-700 ${
          isDark ? 'bg-slate-950 text-slate-100' : 'bg-slate-50 text-slate-900'
        }`}>

          {/* ==========================================
              TRICOLOR BACKGROUND AURAS (Patriotic Warm Design)
              ========================================== */}
          <div className="absolute top-0 left-0 w-full h-[900px] pointer-events-none overflow-hidden z-0">
            <div className="absolute top-[-5%] left-[-10%] w-[50%] h-[50%] rounded-full bg-orange-500/5 dark:bg-orange-600/5 blur-[120px] animate-aura-saffron"></div>
            <div className="absolute top-[25%] right-[-10%] w-[50%] h-[50%] rounded-full bg-emerald-500/5 dark:bg-emerald-600/5 blur-[120px] animate-aura-green"></div>
            
            <div className="absolute top-[12%] left-[50%] -translate-x-1/2 w-[550px] h-[550px] rounded-full border border-slate-200/40 dark:border-slate-800/10 flex items-center justify-center opacity-40">
              <div className="w-[480px] h-[480px] rounded-full border border-dashed border-slate-300/30 dark:border-slate-800/5 animate-symbol-spin"></div>
            </div>
          </div>

          {/* ==========================================
              NAVIGATION BAR (Pure White Theme default)
              ========================================== */}
          <nav className={`fixed top-0 left-0 w-full z-50 transition-all duration-300 border-b ${
            isDark 
              ? 'bg-slate-950/90 backdrop-blur-md border-slate-900 py-2.5' 
              : 'bg-white/95 backdrop-blur-md border-slate-200 py-2.5 shadow-sm'
          }`}>
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex items-center justify-between">
                
                {/* BRAND CIRCLE LOGO - LARGE SIZE */}
                <div className="flex items-center space-x-4 cursor-pointer py-1" onClick={() => handleSmoothScroll('main')}>
                  <div className="relative w-16 h-16 rounded-full border-2 border-orange-500 overflow-hidden bg-white flex items-center justify-center shadow-md shrink-0">
                    <img 
                      src="bharat.png" 
                      alt="Smart Bharat Logo" 
                      className="w-full h-full object-cover"
                      onError={(e) => {
                        e.target.style.display = 'none';
                        e.target.parentNode.innerHTML = `<div class="text-xs font-black text-orange-500">SB</div>`;
                      }}
                    />
                  </div>
                  <div>
                    <span className="block text-lg font-black tracking-tight leading-none text-slate-800 dark:text-slate-100">
                      {currentText.brand}
                    </span>
                    <span className="block text-xs font-bold tracking-wider uppercase text-orange-500 dark:text-orange-400 mt-1">
                      {currentText.tagline}
                    </span>
                  </div>
                </div>

                {/* Friendly Navigation Links */}
                <div className="hidden md:flex items-center space-x-8">
                  <button onClick={() => handleSmoothScroll('main')} className="text-xs font-bold uppercase tracking-wider text-slate-600 dark:text-slate-300 hover:text-orange-500 dark:hover:text-orange-400 transition-colors">Main</button>
                  <button onClick={() => handleSmoothScroll('services')} className="text-xs font-bold uppercase tracking-wider text-slate-600 dark:text-slate-300 hover:text-orange-500 dark:hover:text-orange-400 transition-colors">Services</button>
                  <button onClick={() => handleSmoothScroll('raise-complaint')} className="text-xs font-bold uppercase tracking-wider text-slate-600 dark:text-slate-300 hover:text-orange-500 dark:hover:text-orange-400 transition-colors">Raise Complaint</button>
                  <button onClick={() => handleSmoothScroll('my-complaints')} className="text-xs font-bold uppercase tracking-wider text-slate-600 dark:text-slate-300 hover:text-orange-500 dark:hover:text-orange-400 transition-colors">My Complaints</button>
                  <button onClick={() => handleSmoothScroll('resources-section')} className="text-xs font-bold uppercase tracking-wider text-slate-600 dark:text-slate-300 hover:text-orange-500 dark:hover:text-orange-400 transition-colors">Resources</button>
                  <button onClick={() => handleSmoothScroll('about')} className="text-xs font-bold uppercase tracking-wider text-slate-600 dark:text-slate-300 hover:text-orange-500 dark:hover:text-orange-400 transition-colors">About</button>
                </div>

                {/* Theme & Language Utilities */}
                <div className="hidden md:flex items-center space-x-4">
                  
                  <div className="relative group">
                    <button className="flex items-center space-x-1.5 px-3 py-2 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900 text-xs font-bold text-slate-850 dark:text-slate-100 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all focus:outline-none">
                      <svg className="w-3.5 h-3.5 text-orange-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m5 8 6 6"/><path d="m4 14 6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="m22 22-5-10-5 10"/><path d="M14 18h6"/></svg>
                      <span>{lang === 'en' ? 'English' : lang === 'hi' ? 'हिन्दी' : lang === 'bn' ? 'বাংলা' : lang === 'ta' ? 'தமிழ்' : 'తెలుగు'}</span>
                      <svg className="w-3 h-3 text-slate-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                    </button>

                        x1="0" y1="0" x2="100%" y2="0" 
                        stroke="#FF9933" strokeWidth="2" 
                        className="animated-journey-path" 
                      />
                    </svg>
                  </div>

                  {/* Node 1 */}
                  <div className="relative z-10 flex flex-col items-center text-center px-4 space-y-4 group">
                    <div className="w-16 h-16 rounded-full bg-orange-500/10 border-2 border-orange-500 flex items-center justify-center text-orange-500 shadow-md group-hover:scale-110 transition-transform duration-300">
                      <svg className="w-6 h-6 animate-pulse" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    </div>
                    <div>
                      <h3 className="text-xs font-black uppercase tracking-wider text-orange-500 mb-1.5">{currentText.step1}</h3>
                      <p className="text-[11px] text-slate-500 dark:text-slate-400 leading-relaxed font-semibold">
                        {currentText.step1Desc}
                      </p>
                    </div>
                  </div>

                  {/* Node 2 */}
                  <div className="relative z-10 flex flex-col items-center text-center px-4 space-y-4 group">
                    <div className="w-16 h-16 rounded-full bg-slate-100 dark:bg-slate-900 border-2 border-slate-300 dark:border-slate-700 flex items-center justify-center text-slate-600 dark:text-slate-400 shadow-md group-hover:scale-110 transition-transform duration-300">
                      <svg className="w-6 h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    </div>
                    <div>
                      <h3 className="text-xs font-black uppercase tracking-wider text-slate-700 dark:text-slate-300 mb-1.5">{currentText.step2}</h3>
                      <p className="text-[11px] text-slate-500 dark:text-slate-400 leading-relaxed font-semibold">
                        {currentText.step2Desc}
                      </p>
                    </div>
                  </div>

                  {/* Node 3 */}
                  <div className="relative z-10 flex flex-col items-center text-center px-4 space-y-4 group">
                    <div className="w-16 h-16 rounded-full bg-emerald-500/10 border-2 border-emerald-500 flex items-center justify-center text-emerald-500 shadow-md group-hover:scale-110 transition-transform duration-300">
                      <svg className="w-6 h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    </div>
                    <div>
                      <h3 className="text-xs font-black uppercase tracking-wider text-emerald-500 mb-1.5">{currentText.step3}</h3>
                      <p className="text-[11px] text-slate-500 dark:text-slate-400 leading-relaxed font-semibold">
                        {currentText.step3Desc}
                      </p>
                    </div>
                  </div>

                  {/* Node 4 */}
                  <div className="relative z-10 flex flex-col items-center text-center px-4 space-y-4 group">
                    <div className="w-16 h-16 rounded-full bg-blue-500/10 border-2 border-blue-500 flex items-center justify-center text-blue-500 shadow-md group-hover:scale-110 transition-transform duration-300">
                      <svg className="w-6 h-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    </div>
                    <div>
                      <h3 className="text-xs font-black uppercase tracking-wider text-blue-500 mb-1.5">{currentText.step4}</h3>
                      <p className="text-[11px] text-slate-500 dark:text-slate-400 leading-relaxed font-semibold">
                        {currentText.step4Desc}
                      </p>
                    </div>
                  </div>

                </div>
              </div>

            </div>
          </section>

          {/* ==========================================
              COMPLAINT TRACKING VIEWPORT (Dynamic verification ledger)
              ========================================== */}
          <section id="my-complaints" className={`py-16 border-t ${
            isDark ? 'border-slate-900 bg-slate-950/10' : 'border-slate-200 bg-white'
          }`}>
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-12 items-stretch">
                
                {/* Left details panel */}
                <div className="lg:col-span-5 flex flex-col justify-center space-y-4">
                  <span className="text-xs font-extrabold uppercase tracking-wider text-orange-500">
                    Your Neighborhood Status Gateway
                  </span>
                  <h2 className="text-2xl sm:text-3xl font-black tracking-tight text-slate-850 dark:text-slate-100 leading-tight">
                    Track Your Complaint
                  </h2>
                  <p className="text-xs sm:text-sm text-slate-500 dark:text-slate-400 leading-relaxed font-semibold">
                    Enter your Complaint ID (e.g. SB-2026-XXXXXX or try preloaded SB-101) below to search your device memory and view real-time status.
                  </p>
                  
                  <div className="pt-2 text-xs font-semibold text-slate-400 flex flex-col gap-2">
                    <div className="flex items-center gap-2">
                      <span className="w-1.5 h-1.5 rounded-full bg-orange-500"></span>
                      <span>Reads local records stored inside browser memory</span>
                    </div>
                    <div className="flex items-center gap-2">
                      <span className="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
                      <span>Verifiable progress updates of your filed issues</span>
                    </div>
                  </div>
                </div>

                {/* Tracking Input Console */}
                <div className="lg:col-span-7 flex flex-col justify-center">
                  <div className={`p-6 rounded-3xl border ${
                    isDark ? 'bg-slate-900 border-slate-800' : 'bg-slate-100/60 border-slate-200'
                  }`}>
                    <h3 className="text-xs font-extrabold uppercase tracking-wider text-orange-500 mb-4 flex items-center gap-1.5">
                      <svg className="w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                      {currentText.trackingTitle}
                    </h3>
                    
                    <form onSubmit={handleSearchTracker} className="flex gap-2 mb-4">
                      <input 
                        type="text" 
                        placeholder="Type complaint ID (e.g., SB-101 or your generated ID)"
                        value={trackerCode}
                        onChange={(e) => setTrackerCode(e.target.value)}
                        className={`flex-1 text-xs py-3 px-3.5 rounded-xl border outline-none transition-all ${
                          isDark 
                            ? 'bg-slate-950 border-slate-800 text-slate-200 focus:border-slate-750' 
                            : 'bg-white border-slate-300 text-slate-800 focus:border-orange-500 shadow-sm'
                        }`}
                      />
                      <button 
                        type="submit"
                        className="py-3 px-5 bg-slate-900 hover:bg-slate-800 text-white font-extrabold text-xs rounded-xl transition-all shadow-sm"
                      >
                        Track
                      </button>
                    </form>

                    {/* Show outputs */}
                    {trackingResult ? (
                      <div className={`p-4 rounded-2xl border transition-all space-y-4 ${
                        isDark ? 'bg-slate-950/80 border-slate-800' : 'bg-white border-slate-300/80 shadow-inner'
                      }`}>
                        <div className="flex items-start justify-between">
                          <div>
                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wide">COMPLAINT RECORD DETECTED</span>
                            <h4 className="text-sm font-black text-slate-800 dark:text-slate-100 mt-0.5">{trackingResult.id}</h4>
                          </div>
                          <span className="text-[10px] px-2.5 py-0.5 rounded-full font-bold border border-emerald-500/20 bg-emerald-500/10 text-emerald-600">
                            Active Verifiable
                          </span>
                        </div>

                        {/* Summary */}
                        <div className="grid grid-cols-2 gap-2 text-[11px] pb-3 border-b border-slate-200 dark:border-slate-850">
                          <div>
                            <span className="block text-slate-400 font-bold">Category</span>
                            <span className="font-extrabold text-slate-700 dark:text-slate-200">{trackingResult.category}</span>
                          </div>
                          <div>
                            <span className="block text-slate-400 font-bold">Assigned Department</span>
                            <span className="font-extrabold text-slate-700 dark:text-slate-200">{trackingResult.department}</span>
                          </div>
                        </div>
                        
                        <p className="text-[11px] text-slate-500 dark:text-slate-400 leading-relaxed">
                          <strong>Reported issue:</strong> {trackingResult.description}
                        </p>

                        {/* VERTICAL INTERACTIVE PROGRESS TIMELINE */}
                        <div className="pt-4 border-t border-slate-250 dark:border-slate-850 space-y-5">
                          <span className="block text-[10px] font-black tracking-wider uppercase text-slate-400">
                            Current Status Progression
                          </span>

                          <div className="relative pl-6 space-y-6 text-xs text-slate-600 dark:text-slate-350">
                            
                            {/* Line connector */}
                            <div className="absolute top-1.5 bottom-1.5 left-[7px] w-0.5 bg-slate-200 dark:bg-slate-850"></div>

                            {/* Stage 1: Submitted */}
                            <div className="relative flex items-start gap-3">
                              <span className="absolute -left-[24px] w-4.5 h-4.5 rounded-full bg-emerald-500 border-4 border-white dark:border-slate-900 flex items-center justify-center"></span>
                              <div>
                                <h5 className="font-black text-slate-800 dark:text-white">🟢 Submitted</h5>
                                <p className="text-[10px] text-slate-450 mt-0.5">Complaint generated and safely filed in our local system.</p>
                              </div>
                            </div>

                            {/* Stage 2: Assigned */}
                            <div className="relative flex items-start gap-3">
                              <span className={`absolute -left-[24px] w-4.5 h-4.5 rounded-full border-4 border-white dark:border-slate-900 flex items-center justify-center ${
                                ["assigned", "under review", "resolved"].includes(trackingResult.status.toLowerCase())
                                  ? "bg-emerald-500"
                                  : "bg-slate-200 dark:bg-slate-800"
                              }`}></span>
                              <div>
                                <h5 className="font-black text-slate-800 dark:text-white">🟢 Assigned</h5>
                                <p className="text-[10px] text-slate-450 mt-0.5">Ticket forwarded successfully to the local division officer.</p>
                              </div>
                            </div>

                            {/* Stage 3: Under Review */}
                            <div className="relative flex items-start gap-3">
                              <span className={`absolute -left-[24px] w-4.5 h-4.5 rounded-full border-4 border-white dark:border-slate-900 flex items-center justify-center ${
                                ["under review", "resolved"].includes(trackingResult.status.toLowerCase())
                                  ? "bg-yellow-500"
                                  : "bg-slate-200 dark:bg-slate-800"
                              }`}></span>
                              <div>
                                <h5 className="font-black text-slate-800 dark:text-white">🟡 Under Review</h5>
                                <p className="text-[10px] text-slate-450 mt-0.5">Local engineers are inspecting the physical site and preparing raw materials.</p>
                              </div>
                            </div>

                            {/* Stage 4: Resolved */}
                            <div className="relative flex items-start gap-3">
                              <span className={`absolute -left-[24px] w-4.5 h-4.5 rounded-full border-4 border-white dark:border-slate-900 flex items-center justify-center ${
                                trackingResult.status.toLowerCase() === "resolved"
                                  ? "bg-emerald-500"
                                  : "bg-slate-200 dark:bg-slate-800"
                              }`}></span>
                              <div>
                                <h5 className="font-black text-slate-800 dark:text-white">⚪ Resolved</h5>
                                <p className="text-[10px] text-slate-450 mt-0.5">Works concluded safely. Streets are safe and cleared for citizens.</p>
                              </div>
                            </div>

                          </div>
                        </div>

                      </div>
                    ) : (
                      <div className="text-center py-6 text-xs text-slate-400 font-semibold border border-dashed border-slate-300 dark:border-slate-800 rounded-2xl">
                        Type any simple letter code (e.g. SB-101, SB-102) to inspect neighborhood progress reports.
                      </div>
                    )}

                  </div>
                </div>

              </div>

            </div>
          </section>

          {/* CITIZEN EXTERNAL RESOURCES */}
          <section id="resources-section" className={`py-12 border-t ${
            isDark ? 'border-slate-900 bg-slate-950/10' : 'border-slate-200 bg-slate-100/10'
          }`}>
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              
              <div className="text-center max-w-2xl mx-auto mb-8">
                <h3 className="text-sm font-extrabold uppercase tracking-widest text-slate-400 dark:text-slate-500">
                  {currentText.officialResources}
                </h3>
              </div>

              <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                
                <a href="https://pgportal.gov.in/" target="_blank" rel="noreferrer" className={`p-4 rounded-2xl border text-center transition-all hover:-translate-y-0.5 ${
                  isDark ? 'bg-slate-900 border-slate-800 hover:bg-slate-800 text-slate-200' : 'bg-white border-slate-200 hover:bg-slate-50 text-slate-800 shadow-sm'
                }`}>
                  <h4 className="text-xs font-black text-orange-500 uppercase tracking-wide mb-1">PGPortal</h4>
                  <p className="text-[10px] text-slate-500 leading-relaxed">Centralized National Grievance Portal</p>
                </a>

                <a href="https://uidai.gov.in/" target="_blank" rel="noreferrer" className={`p-4 rounded-2xl border text-center transition-all hover:-translate-y-0.5 ${
                  isDark ? 'bg-slate-900 border-slate-800 hover:bg-slate-800 text-slate-200' : 'bg-white border-slate-200 hover:bg-slate-50 text-slate-800 shadow-sm'
                }`}>
                  <h4 className="text-xs font-black text-orange-500 uppercase tracking-wide mb-1">UIDAI Aadhaar</h4>
                  <p className="text-[10px] text-slate-500 leading-relaxed">Official Government Card Services</p>
                </a>

                <a href="https://pmkisan.gov.in/" target="_blank" rel="noreferrer" className={`p-4 rounded-2xl border text-center transition-all hover:-translate-y-0.5 ${
                  isDark ? 'bg-slate-900 border-slate-800 hover:bg-slate-800 text-slate-200' : 'bg-white border-slate-200 hover:bg-slate-50 text-slate-800 shadow-sm'
                }`}>
                  <h4 className="text-xs font-black text-orange-500 uppercase tracking-wide mb-1">PM-Kisan Portal</h4>
                  <p className="text-[10px] text-slate-500 leading-relaxed">Official Farming Benefit Register</p>
                </a>

                <a href="https://www.digitalindia.gov.in/" target="_blank" rel="noreferrer" className={`p-4 rounded-2xl border text-center transition-all hover:-translate-y-0.5 ${
                  isDark ? 'bg-slate-900 border-slate-800 hover:bg-slate-800 text-slate-200' : 'bg-white border-slate-200 hover:bg-slate-50 text-slate-800 shadow-sm'
                }`}>
                  <h4 className="text-xs font-black text-orange-500 uppercase tracking-wide mb-1">Digital India</h4>
                  <p className="text-[10px] text-slate-500 leading-relaxed">National Digital Empowerment Initiatives</p>
                </a>

              </div>
            </div>
          </section>

          {/* ABOUT MISSION SECTION */}
          <section id="about" className={`py-16 border-t ${
            isDark ? 'border-slate-900 bg-slate-950/20' : 'border-slate-200 bg-white'
          }`}>
            <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center space-y-6">
              <div className="inline-flex items-center justify-center p-3 rounded-2xl bg-orange-500/10 text-orange-500">
                <svg className="w-6 h-6 animate-pulse" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              </div>
              <h2 className="text-2xl sm:text-3xl font-black tracking-tight text-slate-850 dark:text-slate-100">{currentText.aboutTitle}</h2>
              <p className="text-xs sm:text-sm text-slate-600 dark:text-slate-400 leading-relaxed max-w-2xl mx-auto font-semibold">
                {currentText.aboutText}
              </p>
            </div>
          </section>

          {/* FOOTER */}
          <footer className={`border-t py-12 ${
            isDark ? 'border-slate-900 bg-slate-950/40' : 'border-slate-200 bg-slate-55'
          }`}>
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              
              <div className="flex flex-col md:flex-row items-center justify-between gap-6 text-xs text-slate-500 font-medium">
                
                {/* Brand Footprint with Circle Logo */}
                <div className="flex items-center space-x-3">
                  <div className="w-10 h-10 rounded-full overflow-hidden bg-white border border-slate-200 dark:border-slate-800 flex items-center justify-center shadow-inner shrink-0">
                    <img 
                      src="bharat.png" 
                      alt="Smart Bharat Logo" 
                      className="w-full h-full object-cover"
                      onError={(e) => {
                        e.target.style.display = 'none';
                        e.target.parentNode.innerHTML = `<div class="text-[9px] font-black text-orange-500">SB</div>`;
                      }}
                    />
                  </div>
                  <div>
                    <span className="block text-xs font-extrabold tracking-tight text-slate-800 dark:text-slate-200">{currentText.brand}</span>
                    <span className="block text-[10px] text-slate-500 dark:text-slate-400">Independent Citizens Assistance Helper</span>
                  </div>
                </div>

                {/* Developer Credits - Tejas Yadav */}
                <div className="text-center p-3 rounded-xl border border-slate-200/60 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-950/40">
                  <span className="block text-[10px] uppercase font-bold text-slate-400 tracking-wider">Designed & Developed By</span>
                  <a 
                    href="https://www.linkedin.com/in/tejas-yadav-3b1ab83a6" 
                    target="_blank" 
                    rel="noopener noreferrer"
                    className="inline-flex items-center gap-1.5 text-xs font-black text-orange-600 dark:text-orange-400 hover:underline mt-0.5"
                  >
                    <span>Tejas Yadav</span>
                    <svg className="w-3.5 h-3.5 text-blue-500" fill="currentColor" viewBox="0 0 24 24">
                      <path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14m-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 0 0 1.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 0 0-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z"/>
                    </svg>
                  </a>
                </div>

                {/* Right Links & Disclaimer */}
                <div className="text-center md:text-right space-y-1">
                  <p>{currentText.copyright}</p>
                  <p className="text-[10px] text-slate-400 dark:text-slate-500 font-normal">
                    This portal operates independently of official government servers to assist in application letter drafts.
                  </p>
                </div>

              </div>

            </div>
          </footer>

          {/* TOAST NOTIFICATION ENGINE */}
          {toastMessage && (
            <div className="fixed bottom-5 right-5 z-50 animate-bounce">
              <div className={`py-3 px-5 rounded-2xl border text-xs font-extrabold shadow-xl flex items-center gap-2 ${
                isDark ? 'bg-slate-900 border-slate-800 text-slate-200 shadow-slate-950/50' : 'bg-white border-slate-150 text-slate-800 shadow-slate-200/50'
              }`}>
                <div className="w-1.5 h-1.5 rounded-full bg-orange-500"></div>
                <span>{toastMessage}</span>
              </div>
            </div>
          )}

        </div>
      );
    }

    // React Mount Injection to DOM mount
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

</body>
</html>
