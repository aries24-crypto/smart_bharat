    /* Gentle, reassuring background animation representing the tricolor theme */
    @keyframes slowWave {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(20px, -30px) scale(1.05); }
      66% { transform: translate(-15px, 15px) scale(0.98); }
      100% { transform: translate(0, 0) scale(1); }
    }
    .animate-aura-orange {
      animation: slowWave 15s ease-in-out infinite;
    }
    .animate-aura-green {
      animation: slowWave 18s ease-in-out infinite;
    }
    
    /* Gentle rotation for our symbolic wheel */
    @keyframes gentleRotation {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .animate-wheel-rotation {
      animation: gentleRotation 160s linear infinite;
    }

    /* Animated dash for visual progress guide */
    @keyframes progressDash {
      0% { stroke-dashoffset: 24; }
      100% { stroke-dashoffset: 0; }
    }
    .animated-progress-line {
      stroke-dasharray: 6, 4;

    }

    }
    .scrollbar-dark::-webkit-scrollbar-thumb {
